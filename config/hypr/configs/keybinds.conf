$terminal = kitty
$fileManager = nautilus
$browser = brave

$mainMod = SUPER # Sets "Windows" key as main modifier
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, SPACE, exec, zen0x-launch-walker
bind = $mainMod SHIFT, SPACE, exec, zen0x-menu
bind = $mainMod, B, exec, $browser
bind = $mainMod, W, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, uwsm-app -- $fileManager
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod SHIFT, F, fullscreen

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, R,submap,resize
submap=resize
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
binde = , Return,submap,reset
submap=reset

bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d 

bind = $mainMod SHIFT, S, exec, hyprshot -m region --raw | satty --filename -
bind = $mainMod SHIFT, ESCAPE, exec, pgrep -x wlogout || wlogout -b 5
bind = $mainMod SHIFT, C, exec, code
bind = $mainMod SHIFT, W, exec, zen0x-theme-reload

# TAB between workspaces
bindd = ALT, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

#SwayOSD
bind = , XF86AudioRaiseVolume, exec, swayosd-client --volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --volume lower
bind = , XF86AudioMute, exec, swayosd-client --volume mute

